name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: python -m pip install ".[dev]"

      - name: Ruff
        run: ruff check src/pras tests --extend-select=I,UP

      - name: Basedpyright
        run: basedpyright src/pras tests

      - name: Unit tests
        run: pytest tests/unit -q
